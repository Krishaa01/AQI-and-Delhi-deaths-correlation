<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: auto;
      background: radial-gradient(circle at center, #0a0a1a, #000000);
      font-family: sans-serif;
    }

    text {
      fill: white;
      font-size: 10px;
      text-anchor: middle;
      pointer-events: none;
    }
  </style>
</head>

<body>
<svg></svg>

<script>

// 🌌 Canvas
const width = window.innerWidth * 2;
const height = window.innerHeight * 2;

const svg = d3.select("svg")
  .attr("width", width)
  .attr("height", height);

// 🌟 Tooltip
const tooltip = d3.select("body")
  .append("div")
  .style("position", "absolute")
  .style("color", "white")
  .style("background", "rgba(0,0,0,0.7)")
  .style("padding", "6px 10px")
  .style("border-radius", "6px")
  .style("font-size", "12px")
  .style("pointer-events", "none")
  .style("opacity", 0);

d3.csv("genre_data.csv").then(data => {

  // ✅ Convert
  data.forEach(d => {
    d.avg_popularity = +d["avg_popularity"];
    d.hit_percentage = +d["hit_percentage"];
  });

  // ✅ Clean
  data = data.filter(d => d.avg_popularity && d.hit_percentage);

  // 🎨 Size
  const sizeScale = d3.scaleLinear()
    .domain([0, d3.max(data, d => d.avg_popularity)])
    .range([15, 80]);

  // 🎯 BUCKET COLOR FUNCTION
  function getColor(hit) {
    if (hit <= 5) return "#4caf50";        // 🟢 low
    else if (hit <= 12) return "#2196f3";  // 🔵 low-mid
    else if (hit <= 20) return "#9c27b0";  // 🟣 medium
    else if (hit <= 30) return "#ff9800";  // 🟠 high
    else return "#f44336";                 // 🔴 very high
  }

  // 🌌 Simulation
  const simulation = d3.forceSimulation(data)
    .force("charge", d3.forceManyBody().strength(40))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(d => sizeScale(d.avg_popularity) + 5))
    .force("x", d3.forceX(width / 2).strength(0.05))
    .force("y", d3.forceY(height / 2).strength(0.05));

  // 🔵 Nodes
  const nodes = svg.selectAll("circle")
    .data(data)
    .enter()
    .append("circle")
    .attr("r", d => sizeScale(d.avg_popularity))
    .attr("fill", d => getColor(d.hit_percentage))
    .attr("opacity", 0.9)

    // 🌟 Hover
    .on("mouseover", function(event, d) {
      d3.select(this)
        .transition()
        .duration(200)
        .attr("r", sizeScale(d.avg_popularity) * 1.5);

      tooltip
        .style("opacity", 1)
        .html(`<strong>${d.genre}</strong><br>Hit: ${d.hit_percentage.toFixed(1)}%`);
    })

    .on("mousemove", function(event) {
      tooltip
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY - 10) + "px");
    })

    .on("mouseout", function(event, d) {
      d3.select(this)
        .transition()
        .duration(200)
        .attr("r", sizeScale(d.avg_popularity));

      tooltip.style("opacity", 0);
    });

  // 🏷 Labels
  const labels = svg.selectAll("text")
    .data(data)
    .enter()
    .append("text")
    .text(d => d.genre);

  // 🔄 Animation
  simulation.on("tick", () => {
    nodes
      .attr("cx", d => d.x)
      .attr("cy", d => d.y);

    labels
      .attr("x", d => d.x)
      .attr("y", d => d.y);
  });

});
</script>

</body>
</html>
